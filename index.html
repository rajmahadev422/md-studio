<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link id="hlTheme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:1rem;flex-shrink:0">
    <div class="logo">md<span>·</span>studio</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabConvert" onclick="switchMode('convert')">Convert</button>
      <button class="mode-tab" id="tabWrite" onclick="switchMode('write')">Write</button>
    </div>
  </div>

  <div class="header-right">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="color:var(--muted);flex-shrink:0"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    <input type="text" id="filenameInput" value="document" placeholder="filename" title="Filename for downloads" />

    <label class="btn" style="cursor:pointer" title="Upload .md or .txt file">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 10V3M5 6l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Upload
      <input type="file" accept=".md,.txt,.markdown,.text" style="display:none" onchange="handleFileInput(event)" />
    </label>

    <button class="btn" onclick="loadSample()">Sample</button>

    <div class="dropdown" id="dlDropdown">
      <button class="btn btn-green" onclick="toggleDropdown()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 3v8M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Download
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="dropdown-menu" id="dlMenu">
        <button class="di" onclick="downloadFile('pdf')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 6h4M5 9h6M5 12h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          PDF<span class="di-ext">.pdf</span>
        </button>
        <button class="di" onclick="downloadFile('md')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 10V6l2.5 3L9 6v4M11 6v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Markdown<span class="di-ext">.md</span>
        </button>
        <button class="di" onclick="downloadFile('txt')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Plain Text<span class="di-ext">.txt</span>
        </button>
        <button class="di" onclick="downloadFile('html')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 2l-2 6 2 6M13 2l2 6-2 6M6 12l4-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          HTML Page<span class="di-ext">.html</span>
        </button>
      </div>
    </div>

    <button class="btn btn-icon" onclick="clearAll()" title="Clear editor">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
    </button>

    <!-- ══ THEME TOGGLE ══ -->
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle light / dark mode">
      <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div class="app-body">

  <!-- ══ CONVERT VIEW ══ -->
  <div id="convertView" style="display:flex">

    <!-- Left: source -->
    <div class="panel" id="panelLeft" style="flex: 0 0 50%">
      <div class="panel-bar">
        <span class="panel-label">Source</span>
        <span class="stat" id="charCount">0 chars · 0 words</span>
      </div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-overlay" id="dropOverlay">
          <div class="drop-icon">📄</div>
          <div class="drop-text">Drop file to open</div>
          <div class="drop-sub">.md · .txt · .markdown</div>
        </div>
        <textarea id="mdInput" placeholder="Paste Markdown or plain text here, drag &amp; drop a .md/.txt file, or click 'Sample'…" oninput="onSourceInput()" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- Resizable divider -->
    <div class="resizer" id="resizer" title="Drag to resize panels">
      <div class="resizer-grip">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Right: preview -->
    <div class="panel" id="panelRight" style="flex: 1">
      <div class="panel-bar">
        <span class="panel-label">Preview</span>
        <span class="stat" id="readTime"></span>
      </div>
      <div class="preview-scroll">
        <div class="empty-state" id="emptyState">
          <svg width="52" height="52" viewBox="0 0 64 64" fill="none"><rect x="10" y="6" width="44" height="52" rx="4" stroke="currentColor" stroke-width="2.5"/><line x1="19" y1="20" x2="45" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="19" y1="28" x2="45" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="19" y1="36" x2="36" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <p>Rendered preview appears here as you type.</p>
        </div>
        <div class="prose" id="preview" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ══ WRITE VIEW ══ -->
  <div id="writeView">
    <div class="toolbar">
      <button class="tb" title="Bold · Ctrl+B" onclick="fmt('bold')"><b>B</b></button>
      <button class="tb" title="Italic · Ctrl+I" onclick="fmt('italic')"><span style="font-style:italic">I</span></button>
      <button class="tb" title="Strikethrough" onclick="fmt('strike')" style="text-decoration:line-through">S</button>
      <button class="tb" title="Inline code" onclick="fmt('code')" style="font-size:0.7rem">`x`</button>
      <div class="tsep"></div>
      <button class="tb-w" title="Heading 1" onclick="fmtLine('h1')">H1</button>
      <button class="tb-w" title="Heading 2" onclick="fmtLine('h2')">H2</button>
      <button class="tb-w" title="Heading 3" onclick="fmtLine('h3')">H3</button>
      <div class="tsep"></div>
      <button class="tb" title="Bullet list" onclick="fmtLine('ul')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="2.5" cy="4.5" r="1.1" fill="currentColor"/><circle cx="2.5" cy="8" r="1.1" fill="currentColor"/><circle cx="2.5" cy="11.5" r="1.1" fill="currentColor"/><line x1="5.5" y1="4.5" x2="14" y2="4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="5.5" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="5.5" y1="11.5" x2="14" y2="11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button class="tb" title="Numbered list" onclick="fmtLine('ol')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><line x1="7" y1="4.5" x2="14" y2="4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="8.5" x2="14" y2="8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="12.5" x2="14" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><text x="1" y="6" font-size="4.5" fill="currentColor" font-family="monospace">1.</text><text x="1" y="10" font-size="4.5" fill="currentColor" font-family="monospace">2.</text><text x="1" y="14" font-size="4.5" fill="currentColor" font-family="monospace">3.</text></svg>
      </button>
      <button class="tb" title="Blockquote" onclick="fmtLine('blockquote')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="2.5" height="10" rx="1.25" fill="currentColor" opacity="0.3"/><line x1="6" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="6" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="6" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tb" title="Code block" onclick="fmtBlock('code')" style="font-size:0.65rem;padding:0 7px">&lt;/&gt;</button>
      <button class="tb" title="Horizontal rule" onclick="fmtBlock('hr')" style="font-size:0.78rem;padding:0 7px">—</button>
      <div class="tsep"></div>
      <button class="tb" title="Insert link · Ctrl+K" onclick="fmtLink()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6.5 9.5a3.5 3.5 0 0 0 5 0l1.5-1.5a3.5 3.5 0 0 0-5-5L7 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9.5 6.5a3.5 3.5 0 0 0-5 0L3 8a3.5 3.5 0 0 0 5 5L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tb" title="Insert image" onclick="fmtImage()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="5" cy="6.5" r="1.1" fill="currentColor"/><path d="M1 11l3.5-3.5 3 3 2-2 3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div style="flex:1"></div>
      <button class="tb-w" onclick="syncWriteToConvert()">→ Preview</button>
    </div>

    <div class="write-area">
      <textarea id="writeInput" placeholder="Start writing here…&#10;&#10;Use the toolbar above for quick formatting, or type Markdown syntax directly.&#10;Plain text works too — no special syntax required." oninput="onWriteInput()" spellcheck="true"></textarea>
    </div>

    <div class="write-footer">
      <span class="wf-stat" id="wfChars">0 chars</span>
      <span class="wf-stat" id="wfWords">0 words</span>
      <span class="wf-stat" id="wfLines">0 lines</span>
      <span class="wf-stat" id="wfRead">~0 min read</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="index.js"></script>
</body>
</html>
